name: Bug Report
description: Something is broken or behaving unexpectedly.
title: "[Bug]: "
labels: ["bug", "triage"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report this bug. Please fill in as much detail as possible.
        **Security issues**: use [GitHub Security Advisories](https://github.com/binaryjack/studently/security/advisories/new) — never this form.

  - type: dropdown
    id: area
    attributes:
      label: Affected area
      description: Which part of the project is affected?
      options:
        - "packages/* (shared library)"
        - "apps/* (application)"
        - "Documentation"
        - "CI / tooling"
        - "Other / unsure"
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - "Critical — data loss / security issue"
        - "High — feature completely broken"
        - "Medium — feature partially broken / workaround exists"
        - "Low — cosmetic / minor inconvenience"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the issue.
      placeholder: |
        1. …
        2. …
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: Include the full error message / stack trace.
      render: shell
    validations:
      required: true

  - type: input
    id: node_version
    attributes:
      label: Node.js version
      placeholder: "v20.11.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - "macOS"
        - "Linux"
        - "Windows"
        - "Other"
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-submission checklist
      options:
        - label: I have searched existing issues and this is not a duplicate.
          required: true
        - label: I have removed any API keys, secrets, or PII from my reproduction case.
          required: true
